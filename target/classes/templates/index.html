<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<title>Food Shop</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="../static/css/st.css" rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-dark bg-dark navbar-expand-lg">
<div class="container">

<a class="navbar-brand" href="/">🍔 FoodShop</a>

<div>

<a href="/cart" class="btn btn-warning">🛒 Cart</a>
<a href="/login" class="btn btn-light">Login</a>

</div>

</div>
</nav>

<div class="container mt-4">

<h2 class="text-center">Menu</h2>

<div class="row">

<div class="col-md-4" th:each="p : ${products}">

<div class="card shadow">

<img th:src="${p.image}" class="card-img-top">

<div class="card-body text-center">

<h5 th:text="${p.name}"></h5>

<p class="text-danger" th:text="${p.price}+' VND'"></p>

<button class="btn btn-success"
th:onclick="'addToCart('+${p.id}+ ')'">

Add to Cart

</button>

</div>

</div>

</div>

</div>

</div>


<div id="chatbot" style="position:fixed;bottom:20px;right:20px;width:250px">

<div class="card">

<div class="card-header bg-primary text-white">

Chatbot

</div>

<div class="card-body">

<div id="chatbox" style="height:150px;overflow:auto"></div>

<input id="msg" class="form-control mt-2">

<button onclick="send()" class="btn btn-primary mt-2 w-100">

Send

</button>

</div>

</div>

</div>

<script src="/js/cart.js"></script>
<script src="/js/chatbot.js"></script>

</body>
</html>
