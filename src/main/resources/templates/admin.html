<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="/css/st.css" rel="stylesheet">
<link href="..//static/css/st.css" rel="stylesheet">
</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container" style="margin-top:100px;">

<h2>Admin Product Manager</h2>

<a href="/product/add" class="btn btn-success mb-3">

Add Product

</a>

<table class="table table-bordered">

<tr>

<th>ID</th>
<th>Name</th>
<th>Price</th>
<th>Hành động</th>

</tr>

<tr th:each="p : ${products}">

<td th:text="${p.id}"></td>
<td th:text="${p.name}"></td>
<td th:text="${p.price}"></td>
<td>
    <a th:href="@{'/product/edit/' + ${p.id}}" class="btn btn-sm btn-primary me-1">Sửa</a>
    <a th:href="@{'/product/delete/' + ${p.id}}" class="btn btn-sm btn-danger" onclick="return confirm('Bạn có chắc muốn xóa?')">Xóa</a>
</td>

</tr>

</table>

</div>
<div th:replace="fragments/footer :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
