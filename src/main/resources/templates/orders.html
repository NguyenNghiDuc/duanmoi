<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Đơn hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/st.css}" rel="stylesheet">
    <link href="..//static/css/st.css" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>
<div class="container">
    <h2>Đơn hàng của bạn</h2>
    <table class="table table-striped">
        <thead>
        <tr>
            <th>ID</th>
            <th>Tổng tiền</th>
            <th>Thanh toán</th>
            <th>Trạng thái</th>
            <th>Danh sách sản phẩm</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="o : ${orders}">
            <td th:text="${o.id}"></td>
            <td th:text="${o.total} + ' VND'"></td>
            <td th:text="${o.paymentMethod}"></td>
            <td>
                <span class="badge" th:classappend="${o.status == 'PAID'} ? ' bg-success' : ${o.status == 'SHIPPED'} ? ' bg-info' : ' bg-warning'" th:text="${o.status}"></span>
            </td>
            <td>
                <ul>
                    <li th:each="item : ${o.items}" th:text="'SP ID: ' + ${item.productId} + ' x ' + ${item.quantity}"></li>
                </ul>
            </td>
        </tr>
        </tbody>
    </table>
    <a href="/products" class="btn btn-primary">Quay lại cửa hàng</a>
</div>
<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
