<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chatbot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link th:href="@{/css/st.css}" rel="stylesheet" />
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>
<div class="container mt-5">
    <h2>Chatbot</h2>
    <div id="chatbox" class="mb-3" style="min-height: 200px; border: 1px solid #ccc; border-radius: 8px; padding: 10px; background: #fff;"></div>
    <div class="input-group">
        <input id="msg" type="text" class="form-control" placeholder="Nói gì đó với chatbot..." />
        <button class="btn btn-primary" onclick="send()">Gửi</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/chatbot.js"></script>
</body>
</html>
