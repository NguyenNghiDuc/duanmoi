<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Add Product</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="../static/css/st.css" rel="stylesheet">

</head>

<body>

<div class="container mt-4">

<h2>Add Product</h2>

<form action="/product/save" method="post">

<input name="name" class="form-control mt-2" placeholder="Product name">

<input name="price" class="form-control mt-2" placeholder="Price">

<input name="image" class="form-control mt-2" placeholder="Image URL">

<button class="btn btn-success mt-3">

Save

</button>

</form>

</div>

</body>

</html>
