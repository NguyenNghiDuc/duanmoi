<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Orders</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/st.css}" rel="stylesheet">
    <link href="..//static/css/st.css" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>
<div class="container mt-5">
    <h2>Quản lý đơn hàng</h2>
    <p>Tổng đơn hàng: <strong th:text="${orders.size()}"></strong></p>
    <table class="table table-bordered table-striped">
        <thead>
        <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Tổng tiền</th>
            <th>Phương thức</th>
            <th>Số mặt hàng</th>
            <th>Chi tiết</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="o : ${orders}">
            <td th:text="${o.id}"></td>
            <td th:text="${o.username}"></td>
            <td th:text="${o.total} + ' VND'"></td>
            <td th:text="${o.paymentMethod}"></td>
            <td th:text="${o.items.size()}"></td>
            <td>
                <span class="badge" th:classappend="${o.status == 'PAID'} ? ' bg-success' : ${o.status == 'SHIPPED'} ? ' bg-info' : ' bg-warning'" th:text="${o.status}"></span>
                <form th:action="@{'/admin/orders/' + ${o.id} + '/status'}" method="post" class="d-flex gap-2 mt-2">
                    <select name="status" class="form-select form-select-sm">
                        <option value="PENDING" th:selected="${o.status == 'PENDING'}">PENDING</option>
                        <option value="PAID" th:selected="${o.status == 'PAID'}">PAID</option>
                        <option value="SHIPPED" th:selected="${o.status == 'SHIPPED'}">SHIPPED</option>
                        <option value="DELIVERED" th:selected="${o.status == 'DELIVERED'}">DELIVERED</option>
                    </select>
                    <button class="btn btn-sm btn-primary" type="submit">Cập nhật</button>
                </form>
            </td>
            <td>
                <ul>
                    <li th:each="item : ${o.items}" th:text="'ID ' + ${item.productId} + ' x ' + ${item.quantity}"></li>
                </ul>
            </td>
        </tr>
        </tbody>
    </table>
</div>
<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
