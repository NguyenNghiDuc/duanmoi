<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Cửa hàng thực phẩm</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<link rel="stylesheet" th:href="@{/css/st.css}">

<script th:src="@{/js/cart.js}"></script>

</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">

<h2 class="text-center mb-4">Giỏ hàng</h2>

<table class="table table-bordered table-striped">

<thead>

<tr>
<th>Tên</th>
<th>Giá</th>
<th>Số lượng</th>
<th>Tổng</th>
<th>Hành động</th>
</tr>

</thead>

<tbody>

<tr th:each="entry : ${cartEntries}">

<td th:text="${entry.product.name}"></td>

<td th:text="${entry.product.price} + ' VND'"></td>

<td>

<form th:action="@{/cart/update}" method="post"
class="d-flex gap-2 align-items-center">

<input type="hidden" name="id"
th:value="${entry.product.id}" />

<input type="number"
name="quantity"
th:value="${entry.quantity}"
min="1"
class="form-control"
style="width:100px;" />

<button class="btn btn-sm btn-primary"
type="submit">Cập nhật</button>

</form>

</td>

<td th:text="${entry.total} + ' VND'"></td>

<td>

<form th:action="@{/cart/remove}" method="post">

<input type="hidden"
name="id"
th:value="${entry.product.id}" />

<button class="btn btn-sm btn-danger">
Xóa
</button>

</form>

</td>

</tr>

</tbody>

</table>

<div class="d-flex justify-content-between align-items-center mt-3">

<span class="fs-5">

Tổng tiền:
<strong th:text="${cartTotal} + ' VND'"></strong>

</span>

<div>

<a th:href="@{/products}"
class="btn btn-secondary">

Tiếp tục mua sắm

</a>

<a th:href="@{/checkout}"
class="btn btn-success">

Thanh toán

</a>

</div>

</div>

</div>

<div th:replace="fragments/footer :: footer"></div>

</body>

</html>
