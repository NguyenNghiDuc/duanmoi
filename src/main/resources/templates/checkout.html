<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/st.css}" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>
<div class="container">
    <h2>Thanh toán</h2>

    <table class="table table-bordered">
        <thead>
        <tr>
            <th>Tên</th>
            <th>Giá</th>
            <th>Số lượng</th>
            <th>Tổng</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="entry : ${cartEntries}">
            <td th:text="${entry.product.name}"></td>
            <td th:text="${entry.product.price} + ' VND'"></td>
            <td th:text="${entry.quantity}"></td>
            <td th:text="${entry.total} + ' VND'"></td>
        </tr>
        </tbody>
    </table>

    <div class="mb-3">
        <h4>Tổng hóa đơn: <span th:text="${cartTotal} + ' VND'"></span></h4>
    </div>

    <form action="/checkout" method="post">
        <div class="mb-3">
            <label class="form-label">Phương thức thanh toán</label>
            <select name="paymentMethod" class="form-select">
                <option value="cash">Tiền mặt</option>
                <option value="card">Thẻ tín dụng</option>
                <option value="momo">MoMo</option>
            </select>
        </div>

        <button class="btn btn-success" type="submit">Xác nhận thanh toán</button>
        <a class="btn btn-secondary" href="/cart">Quay lại giỏ hàng</a>
    </form>
</div>
<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
